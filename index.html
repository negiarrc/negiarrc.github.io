<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>

<body>
	<h1>CSS完全に理解した</h1>

</body>
<style>
	:root {
		--bg-color: #ffffff;
		--text-color: #000000;
		--border-color: black;
	}

	@media (prefers-color-scheme: dark) {
		:root {
			--bg-color: #1a1a1a;
			--text-color: #e0e0e0;
			--border-color: #e0e0e0;
		}
	}

	body {
		background-color: var(--bg-color);
		color: var(--text-color);
		transition: background-color 0.3s, color 0.3s;
	}

	h1 {
		border: 5pt var(--border-color) solid;
		padding-left: 20%;
		width: 100px;
		height: 30px;
	}
</style>
</html>
